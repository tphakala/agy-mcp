name: codeql
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 5 * * 1'
permissions:
  contents: read
jobs:
  analyze:
    name: Analyze Go
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: go
          build-mode: autobuild
      - uses: github/codeql-action/analyze@v3
        with:
          category: '/language:go'
