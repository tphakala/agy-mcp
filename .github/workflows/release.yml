name: release
on:
  push:
    tags:
      - 'v*'
  # Manual runs must be dispatched on a tag ref, goreleaser refuses untagged commits.
  workflow_dispatch:
permissions:
  contents: write
jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Test before release
        run: go test ./... -race
      # SHA-pinned: this job holds contents: write, so a moving tag on a third-party
      # action is a supply-chain risk. Dependabot updates the SHA pin. (# v7.2.2)
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
