name: release
on:
  push:
    tags:
      - 'v*'
  # Manual runs must be dispatched on a tag ref, goreleaser refuses untagged commits.
  workflow_dispatch:
permissions:
  contents: write
jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Test before release
        run: go test ./... -race
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
